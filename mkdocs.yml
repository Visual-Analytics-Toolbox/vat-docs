site_name: Visual Analytics - Documentation
site_url: https://docs.berlin-united.com/

nav:
  - 'index.md'
  - Visual Analytics:
    - 'vat/index.md'
    - 'vat/user_management.md'
  - LogCrawler:
    - 'logcrawler/index.md'
    - 'logcrawler/logstructure.md'
  - Developer Setup:
    - 'dev/index.md'
    - 'dev/local_k8s.md'
    - 'dev/local_postgres.md'

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - toc.follow

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: pink
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: purple
      accent: purple
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode